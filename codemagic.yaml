workflows:
  android-workflow:
    name: Android Workflow
    instance_type: linux_x2
    max_build_duration: 120
    environment:
      android_signing:
        - keystore_reference
      vars:
        PACKAGE_NAME: "com.padaria.pdv"
        BUNDLE_ID: "com.padaria.pdv"
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
        - pull_request
      branch:
        include_patterns:
          - main
          - develop
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Run Flutter tests
        script: flutter test
      - name: Build APK
        script: |
          flutter build apk \
            --release \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER
      - name: Build AppBundle
        script: |
          flutter build appbundle \
            --release \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/release/*.aab
    publishing:
      email:
        recipients:
          - user@example.com
        notify:
          success: true
          failure: true

  ios-workflow:
    name: iOS Workflow
    instance_type: mac_mini_m1
    max_build_duration: 120
    environment:
      ios_signing:
        - ios_certificates
      vars:
        PACKAGE_NAME: "com.padaria.pdv"
        BUNDLE_ID: "com.padaria.pdv"
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
        - pull_request
      branch:
        include_patterns:
          - main
          - develop
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Run Flutter tests
        script: flutter test
      - name: Build iOS
        script: |
          flutter build ios \
            --release \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER \
            --no-codesign
      - name: Package for AppStore
        script: |
          cd ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -config Release \
            -derivedDataPath build/ios_build \
            -archivePath build/ios_build/Runner.xcarchive \
            archive
    artifacts:
      - build/ios_build/Runner.xcarchive
    publishing:
      email:
        recipients:
          - user@example.com
        notify:
          success: true
          failure: true

  web-workflow:
    name: Web Workflow
    instance_type: linux_x2
    max_build_duration: 60
    environment:
      flutter: stable
    triggering:
      events:
        - push
        - pull_request
      branch:
        include_patterns:
          - main
          - develop
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Run Flutter tests
        script: flutter test
      - name: Build Web
        script: flutter build web --release
    artifacts:
      - build/web/**
    publishing:
      email:
        recipients:
          - user@example.com
        notify:
          success: true
          failure: true

  analyze-workflow:
    name: Code Analysis
    instance_type: linux_x2
    max_build_duration: 30
    environment:
      flutter: stable
    triggering:
      events:
        - push
        - pull_request
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Analyze code
        script: flutter analyze
      - name: Check formatting
        script: dart format --set-exit-if-changed .
      - name: Run tests
        script: flutter test
