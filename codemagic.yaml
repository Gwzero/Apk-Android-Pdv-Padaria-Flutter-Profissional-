workflows:
  android-workflow:
    name: Android Build & Release
    instance_type: linux_x2
    max_build_duration: 120
    environment:
      android_signing:
        - keystore_reference
      vars:
        PACKAGE_NAME: "com.padaria.pdv"
        GRADLE_OPTS: "-Xmx512m"
      flutter: stable
    triggering:
      events:
        - push
        - pull_request
      branch:
        include_patterns:
          - main
          - develop
    scripts:
      - name: Setup Flutter
        script: flutter config --no-analytics
      - name: Get Flutter packages
        script: flutter pub get
      - name: Run Flutter tests
        script: flutter test
      - name: Build APK Release
        script: |
          flutter build apk \
            --release \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER
      - name: Build AppBundle
        script: |
          flutter build appbundle \
            --release \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
      - build/app/outputs/bundle/release/app-release.aab
    publishing:
      email:
        recipients:
          - user@example.com
        notify:
          success: true
          failure: true

  ios-workflow:
    name: iOS Build & Release
    instance_type: mac_mini_m1
    max_build_duration: 120
    environment:
      ios_signing:
        - ios_certificates
      vars:
        PACKAGE_NAME: "com.padaria.pdv"
        BUNDLE_ID: "com.padaria.pdv"
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
        - pull_request
      branch:
        include_patterns:
          - main
          - develop
    scripts:
      - name: Setup Flutter
        script: flutter config --no-analytics
      - name: Get Flutter packages
        script: flutter pub get
      - name: Run Flutter tests
        script: flutter test
      - name: Build iOS Release
        script: |
          flutter build ios \
            --release \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER
      - name: Create iOS Build Archive
        script: |
          cd ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -derivedDataPath build \
            -archivePath build/Runner.xcarchive \
            archive
    artifacts:
      - ios/build/Runner.xcarchive/**
      - build/ios/iphoneos/Runner.app
    publishing:
      email:
        recipients:
          - user@example.com
        notify:
          success: true
          failure: true

  web-workflow:
    name: Web Build & Deploy
    instance_type: linux_x2
    max_build_duration: 60
    environment:
      flutter: stable
    triggering:
      events:
        - push
        - pull_request
      branch:
        include_patterns:
          - main
          - develop
    scripts:
      - name: Setup Flutter
        script: flutter config --no-analytics
      - name: Get Flutter packages
        script: flutter pub get
      - name: Run Flutter tests
        script: flutter test
      - name: Build Web Release
        script: flutter build web --release --dart-define=FLUTTER_WEB_USE_SKP=true
    artifacts:
      - build/web/**
    publishing:
      email:
        recipients:
          - user@example.com
        notify:
          success: true
          failure: true

  analyze-workflow:
    name: Code Analysis & Testing
    instance_type: linux_x2
    max_build_duration: 30
    environment:
      flutter: stable
    triggering:
      events:
        - push
        - pull_request
      branch:
        include_patterns:
          - main
          - develop
    scripts:
      - name: Setup Flutter
        script: flutter config --no-analytics
      - name: Get Flutter packages
        script: flutter pub get
      - name: Analyze code
        script: flutter analyze
      - name: Check code formatting
        script: dart format --set-exit-if-changed .
      - name: Run unit tests
        script: flutter test --coverage
    artifacts:
      - coverage/lcov.info
    publishing:
      email:
        recipients:
          - user@example.com
        notify:
          success: true
          failure: true
